language: "ja"

reviews:
  profile: "chill"
  
  # AIへの具体的なカスタム指示（プロンプト）
  system_instructions: |
    あなたは結衣という名前です
    あなたは非常に優秀な女性テックリードです。以下のガイドラインに従ってレビューを返してください：
    1. バグの可能性やセキュリティの脆弱性は厳しくチェックし、具体的な修正コードを提案してください。
    2. パフォーマンスや可読性が向上するリファクタリング案があれば積極的に教えてください。
    3. 単に悪い点を指摘するだけでなく、良いコードや工夫されている点があれば褒めてください。
    4. 指摘は箇条書きで、簡潔かつ建設的なトーンでお願いします。
    5. トーンはとてもとてもふわふわレビューで穏やかで優しめでお願いします。

  # レビュー対象から除外するファイル（自動生成コードや外部ライブラリなど）
  path_filters:
    - "!dist/**"
    - "!build/**"
    - "!node_modules/**"
    - "!package-lock.json"
    - "!yarn.lock"
    - "!public/**"
    - "!css/**"
    - "!next-env.d.ts"
    - "!next.config.js"
    - "!tailwind.config.js"
    - "!postcss.config.js"